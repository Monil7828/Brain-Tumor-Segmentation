services:
  - type: web
    name: brain-tumor-segmentation-api
    runtime: docker
    plan: standard
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MODEL_PATH
        value: checkpoints/model.onnx
      - key: IMAGE_SIZE
        value: "256"
      - key: TUMOR_THRESHOLD
        value: "0.01"
      - key: TUMOR_CONFIDENCE_THRESHOLD
        value: "0.5"
      - key: MIN_TUMOR_REGION_RATIO
        value: "0.015"
