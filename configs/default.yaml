project:
  name: "brain-tumor-segmentation"
  seed: 42

data:
  data_dir: "data/processed"
  image_size: 256
  num_classes: 2
  train_split: 0.8
  num_workers: 4
  pin_memory: true
  batch_size: 8
  num_samples: 200
  tumor_ratio: 0.5

augmentation:
  train:
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.3
    rotate_limit: 15
    brightness_limit: 0.2
    contrast_limit: 0.2
  val:
    enabled: false

model:
  name: "unet"
  in_channels: 1
  base_channels: 32

training:
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  amp: true
  grad_clip: 1.0
  checkpoint_dir: "checkpoints"
  log_interval: 10
  onecycle:
    pct_start: 0.3
    anneal_strategy: "cos"
    div_factor: 25.0
    final_div_factor: 10000.0

export:
  onnx_path: "checkpoints/model.onnx"
  opset_version: 17
  dynamic_batch: true

deployment:
  host: "0.0.0.0"
  port: 8000
  model_path: "checkpoints/model.onnx"
  image_size: 256
  tumor_threshold: 0.01
  tumor_confidence_threshold: 0.5
  min_tumor_region_ratio: 0.015
