project:
  name: "tcga-gbm-brats-segmentation"
  seed: 42

data:
  source: "brats"
  raw_dir: "data/Pre-operative_TCGA_GBM_NIfTI_and_Segmentations"
  data_dir: "data/BraTS"
  image_size: 256
  num_classes: 2
  train_split: 0.8
  num_workers: 4
  pin_memory: true
  batch_size: 4
  modalities: ["t1", "t1gd", "t2", "flair"]

augmentation:
  train:
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.2
    rotate_limit: 10
    brightness_limit: 0.15
    contrast_limit: 0.15
  val:
    enabled: false

model:
  name: "unet"
  in_channels: 4
  base_channels: 32

training:
  epochs: 8
  learning_rate: 0.001
  weight_decay: 0.0001
  amp: true
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/brats"
  log_interval: 10
  onecycle:
    pct_start: 0.3
    anneal_strategy: "cos"
    div_factor: 25.0
    final_div_factor: 10000.0

quantization:
  calibration_samples: 32
  output_path: "checkpoints/brats/model_quantized.pt"

export:
  onnx_path: "checkpoints/brats/model.onnx"
  opset_version: 17
  dynamic_batch: true

deployment:
  host: "0.0.0.0"
  port: 8000
  model_path: "checkpoints/brats/model.onnx"
  image_size: 256
  tumor_threshold: 0.005
